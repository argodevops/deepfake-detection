version: "3.9"

services:
  model_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-model_api:local
    container_name: model_api
    ports:
      - "8000:8000"
    networks:
      - internal
    environment:
      MODELS_DIR: /models
      MODELS_CONFIG_PATH: /models/models.json
      REAL_THRESHOLD: "0.5"
      LOG_DIR: /app/logs
      DATA_DIR: /app/data
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read(); print('ok')"
      interval: 10s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../vision-truth-finder/dist:/usr/share/nginx/html:ro
    depends_on:
      - model_api
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
